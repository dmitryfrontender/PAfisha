{{> header pageTitle="Dating"}}

<div class="main-holder">
	<div class="sliderbar">
		<form action="#" class="form-group">
			<div class="row row-search">
				<div class="wrap-input">
		       		<input type="text" placeholder="Поиск по никнейму" class="input search-input">
		       		<button class="search-button">
						<svg class="svg-icon"><use xlink:href="#icon-search"></use></svg>
					</button>
		       	</div>
			</div>
			<div class="row line">
				<div class="label-name">Кого ищу</div>
				<div class="radio-box">
					<label class="wrap-radio">
						<input type="radio" name="radio">
						<span class="checkmark">
							<svg class="svg-icon icon"><use xlink:href="#icon-male"></use></svg>
							<span class="text">М</span>
						</span>
					</label>
					<label class="wrap-radio">
						<input type="radio" checked="checked" name="radio">
						<span class="checkmark">
							<svg class="svg-icon icon female"><use xlink:href="#icon-female"></use></svg>
							<span class="text">Ж</span>
						</span>
					</label>
					<label class="wrap-radio">
						<input type="radio" name="radio">
						<span class="checkmark">
							<svg class="svg-icon icon other"><use xlink:href="#icon-other"></use></svg>
							<span class="text" style="font-size: 16px;">2</span>
							
						</span>
					</label>
				</div>
			</div>
			<div class="row line">
				<div class="label-name">Возраст</div>
				<div class="range-slider-holder">
    				<div class="inform-holder">
    					<div class="inform-item">
    						<input type="text" class="number js-from">
    					</div>
    					-
    					<div class="inform-item">
    						<input type="text" class="number js-to">
    					</div>
    				</div>
    				<input type="text" class="js-range-slider">
    			</div>
			</div>
			<div class="row line">
				<select class="selectbox" id="country-id" style="width: 100%;">
					<option value="" data-img="images/flags/world.svg">Страна</option>
					<option value="DE" data-img="images/flags/de.jpg"> Германия</option>
					<option value="ES" data-img="images/flags/es.jpg">Испания</option>
					<option value="PT" data-img="images/flags/pt.jpg">Португалия</option>
					<option value="US" data-img="images/flags/us.jpg">США</option>
					<option value="DE" data-img="images/flags/de.jpg">Германия</option>
					<option value="ES" data-img="images/flags/es.jpg">Испания</option>
					<option value="PT" data-img="images/flags/pt.jpg">Португалия</option>
					<option value="US" data-img="images/flags/us.jpg">США</option>
					<option value="DE" data-img="images/flags/de.jpg">Германия</option>
				</select>
			</div>
			<div class="row">
				<label class="wrap-checkbox">Только подтверждённые
					<input type="checkbox">
					<span class="checkmark"></span>
				</label>
			</div>
			<div class="row">
				<label class="wrap-checkbox">Только онлайн
					<input type="checkbox" checked="checked">
					<span class="checkmark"></span>
				</label>
			</div>
			<div class="row">
				<button type="submit" class="btn btn-submit">Применить</button>
			</div>
			<div class="row">
				<div class="wrap-reset">
					<a href="#" class="reset-filter">Сбросить фильтр</a>
				</div>
			</div>
		</form>

		<div class="text-info">В поиске не отображаются профили без главного фото</div>
		<div class="wrap-add-photo">
			<a href="#" class="link">Добавить фото</a>
		</div>
	</div>

	<div class="content content-thumbs-col5">
		<div class="banner-filter">
    		<div class="glitch-text">
				<div class="top-text">Оформи <div class="decor">PREMIUM</div></div>
				<div class="bottom-text">Подписку</div>
    			<svg class="svg-icon star-top-left"><use xlink:href="#icon-star-decor"></use></svg>
    			<svg class="svg-icon star-top-right"><use xlink:href="#icon-star-decor"></use></svg>
    			<svg class="svg-icon star-bottom-left"><use xlink:href="#icon-star-decor"></use></svg>
			</div>

    		<div class="text-premium">
    			<div class="top-text">и открой <span class="color">полный доступ</span></div>
    			— без лимитов и преград!
    		</div>

    		<div class="circle-decor">
    			<div class="left-top box-img">
    				<img src="images/circle-left-top.png" alt="avatar" class="img">
    			</div>
    			<div class="right-top box-img">
    				<img src="images/circle-right-top.png" alt="avatar" class="img">
    			</div>
    			<div class="bottom-left box-img">
    				<img src="images/circle-left-bottom.png" alt="avatar" class="img">
    			</div>
    			<div class="bottom-right box-img">
    				<img src="images/circle-right-bottom.png" alt="avatar" class="img">
    			</div>
    			<div class="inner">
    				<div class="center wrap-img">
    					<img src="images/circle-center.png" alt="avatar" class="img">
    				</div>
    			</div>
    		</div>

	    	<a href="#" class="btn-primary">Зарегистрироваться</a>
		</div>

		{{> thumbs-vertical-col5}}

		<div class="pagination-holder reload-wrap">
			<a href="#" class="btn">
				<span class="holder-icon">
					<span class="text">Показать ещё</span>
					<svg class="svg-icon"><use xlink:href="#icon-reload"></use></svg>
				</span>
			</a>
		</div>
	</div>
</div>

{{> footer}}
